<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AI Trading</title>
    <style>
        /* === Dansk: Basis styling === */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }
        
        /* Login boks */
        .login-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 50px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 90%;
        }
        
        .logo {
            font-size: 48px;
            margin-bottom: 20px;
        }
        
        h1 {
            font-size: 28px;
            margin-bottom: 10px;
            color: #4ade80;
        }
        
        p {
            color: #aaa;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        
        /* Google login knap */
        .google-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: #fff;
            color: #333;
            border: none;
            padding: 16px 32px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.2);
            width: 100%;
        }
        
        .google-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 255, 255, 0.3);
            background: #f5f5f5;
        }
        
        .google-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }
        
        .google-btn svg {
            width: 24px;
            height: 24px;
        }
        
        /* Fejlbesked */
        .error-message {
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid rgba(255, 0, 0, 0.3);
            color: #ff6b6b;
            padding: 15px 20px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
            font-size: 14px;
        }
        
        .error-message.show {
            display: block;
        }
        
        /* Loading spinner */
        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid #e0e0e0;
            border-top: 3px solid #333;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .loading .spinner {
            display: inline-block;
        }
        
        .loading .btn-text {
            display: none;
        }
        
        /* Footer */
        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <!-- Logo og titel -->
        <div class="logo">📈</div>
        <h1>AI Trading</h1>
        <p>Log ind med din Google-konto for at få adgang til aktieanalyser og AI-drevet handel.</p>
        
        <!-- Google Login Knap -->
        <button id="googleLoginBtn" class="google-btn" onclick="handleGoogleLogin()">
            <svg viewBox="0 0 24 24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            <span class="btn-text">Log ind med Google</span>
            <span class="spinner"></span>
        </button>
        
        <!-- Fejlbesked -->
        <div id="errorMessage" class="error-message"></div>
    </div>

    <!-- Google Identity Services Script -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <script>
        // === KONFIGURATION ===
        // CLIENT_ID hentes fra localStorage (ikke hardkodet af sikkerhedshensyn)
        const CLIENT_ID = localStorage.getItem('GOOGLE_CLIENT_ID') || '';
        
        // === SESSION HÅNDTERING ===
        // Tjek om bruger allerede er logget ind
        function checkExistingSession() {
            const session = localStorage.getItem('userSession');
            if (session) {
                // Bruger er allerede logget ind - redirect til aktie-siden
                window.location.href = 'ai-trading-v3.html';
            }
        }
        
        // Gem session efter succesfuld login
        function saveSession(userData) {
            const session = {
                email: userData.email,
                name: userData.name,
                picture: userData.picture,
                loginTime: new Date().toISOString()
            };
            localStorage.setItem('userSession', JSON.stringify(session));
        }
        
        // === GOOGLE LOGIN HANDLER ===
        async function handleGoogleLogin() {
            const btn = document.getElementById('googleLoginBtn');
            const errorDiv = document.getElementById('errorMessage');
            
            // Vis loading state
            btn.classList.add('loading');
            btn.disabled = true;
            errorDiv.classList.remove('show');
            
            // Tjek om CLIENT_ID er sat
            if (!CLIENT_ID) {
                showError('Google Client ID ikke konfigureret. Sæt GOOGLE_CLIENT_ID i localStorage.');
                btn.classList.remove('loading');
                btn.disabled = false;
                return;
            }
            
            try {
                // Initialiser Google OAuth via GIS (popup flow)
                const client = google.accounts.oauth2.initTokenClient({
                    client_id: CLIENT_ID,
                    scope: 'email profile openid',
                    callback: handleTokenResponse,  // Callback funktion
                    error_callback: handleOAuthError  // Fejl callback
                });
                
                // Åben popup
                client.requestAccessToken({ prompt: 'consent' });
                
            } catch (error) {
                console.error('Login fejl:', error);
                showError('Der opstod en fejl. Prøv igen.');
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        }
        
        // === TOKEN RESPONSE HANDLER ===
        // Kaldes når bruger godkender i Google popup
        async function handleTokenResponse(tokenResponse) {
            const btn = document.getElementById('googleLoginBtn');
            const errorDiv = document.getElementById('errorMessage');
            
            if (tokenResponse.error) {
                showError('Login afbrudt eller fejlede. Prøv igen.');
                btn.classList.remove('loading');
                btn.disabled = false;
                return;
            }
            
            // Vi har et access token - nu henter vi brugerinfo
            try {
                const userInfo = await fetchUserInfo(tokenResponse.access_token);
                
                // Gem session
                saveSession({
                    email: userInfo.email,
                    name: userInfo.name,
                    picture: userInfo.picture
                });
                
                // Redirect til aktie-siden
                window.location.href = 'ai-trading-v3.html';
                
            } catch (error) {
                console.error('Fejl ved hentning af brugerinfo:', error);
                showError('Kunne ikke hente brugerinfo. Prøv igen.');
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        }
        
        // === HENT USER INFO FRA GOOGLE ===
        async function fetchUserInfo(accessToken) {
            const response = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
                headers: {
                    'Authorization': 'Bearer ' + accessToken
                }
            });
            
            if (!response.ok) {
                throw new Error('Kunne ikke hente brugerinfo');
            }
            
            return await response.json();
        }
        
        // === OAuth FEJL HANDLER ===
        function handleOAuthError(error) {
            const btn = document.getElementById('googleLoginBtn');
            const errorDiv = document.getElementById('errorMessage');
            
            console.error('OAuth fejl:', error);
            
            if (error.type === 'popup_closed') {
                showError('Login popup blev lukket. Prøv igen.');
            } else if (error.type === 'tap_outside') {
                showError('Login blev annulleret. Klik på knappen og prøv igen.');
            } else {
                showError('Login fejlede: ' + (error.message || 'Ukendt fejl'));
            }
            
            btn.classList.remove('loading');
            btn.disabled = false;
        }
        
        // === VIS FEJL BESKED ===
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
        }
        
        // === OPSÆTNING VED SIDE INDLOADNING ===
        document.addEventListener('DOMContentLoaded', function() {
            // Tjek for eksisterende session
            checkExistingSession();
            
            // Tjek for opsætningsfejl
            if (!CLIENT_ID) {
                const errorDiv = document.getElementById('errorMessage');
                errorDiv.textContent = '⚠️ Google Client ID ikke fundet. Kør opsætningsguiden først.';
                errorDiv.classList.add('show');
                document.getElementById('googleLoginBtn').disabled = true;
            }
        });
    </script>
</body>
</html>
